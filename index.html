<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Strasbourg Botanique météo</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --border: #d1d5db;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --card: #1f2937;
        --text: #f9fafb;
        --muted: #9ca3af;
        --accent: #2dd4bf;
        --border: #374151;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 16px; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    .metric {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .label {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .footer {
      margin-top: 20px;
      font-size: .95rem;
      color: var(--muted);
    }
    .error {
      color: #b91c1c;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Strasbourg Botanique</h1>
      <p>Dernière observation horaire de la station Météo-France 67482001.</p>
      <div id="status">Chargement…</div>
      <div id="content" hidden>
        <div class="grid">
          <div class="metric"><div class="label">Température</div><div class="value" id="temperature">–</div></div>
          <div class="metric"><div class="label">Humidité</div><div class="value" id="humidite">–</div></div>
          <div class="metric"><div class="label">Pluie 1h</div><div class="value" id="pluie">–</div></div>
          <div class="metric"><div class="label">Vent moyen</div><div class="value" id="vent">–</div></div>
        </div>
        <div class="footer">
          <div>Heure locale : <strong id="heure"></strong></div>
          <div>Mise à jour du site : <span id="maj"></span></div>
        </div>
      </div>
    </section>
  </main>
  <script>
    async function loadData() {
      const status = document.getElementById('status');
      const content = document.getElementById('content');
      try {
        const response = await fetch('./data/latest.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Impossible de charger latest.json');
        const data = await response.json();
        document.getElementById('temperature').textContent = data.temperature_c ?? '–';
        document.getElementById('humidite').textContent = data.humidite_pct != null ? data.humidite_pct + ' %' : '–';
        document.getElementById('pluie').textContent = data.pluie_1h_mm != null ? data.pluie_1h_mm + ' mm' : '–';
        document.getElementById('vent').textContent = data.vent_moyen_ms != null ? data.vent_moyen_ms + ' m/s' : '–';
        document.getElementById('heure').textContent = data.heure_paris ?? '–';
        document.getElementById('maj').textContent = data.site_updated_at ?? '–';
        status.hidden = true;
        content.hidden = false;
      } catch (error) {
        status.innerHTML = '<span class="error">Erreur : ' + error.message + '</span>';
      }
    }
    loadData();
  </script>
</body>
</html>
